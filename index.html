<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Core -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2d5a27" />

    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Anaqua" />

    <!-- iOS Icons (Safari uses these, not manifest) -->
    <link rel="apple-touch-icon" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="72x72"  href="/icons/icon-72.png" />
    <link rel="apple-touch-icon" sizes="96x96"  href="/icons/icon-96.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />

    <!-- SEO / Share -->
    <meta name="description" content="Tank mix calculator and spray application manager" />
    <meta name="application-name" content="Anaqua Farms" />

    <title>Anaqua Farms</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => console.log('SW registered:', reg.scope))
            .catch((err) => console.error('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
